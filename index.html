<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHORLD Node — WHORLD Pelagos Node</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --accent: #00ffcc;
    --dim: rgba(255,255,255,0.15);
    --text: rgba(255,255,255,0.85);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--dim) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.08;
    pointer-events: none;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    opacity: 0.04;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.04; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.08; transform: translate(-50%, -50%) scale(1.1); }
  }

  .container {
    position: relative;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 1.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    display: block;
    filter: drop-shadow(0 0 20px var(--accent));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .node-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    text-shadow: 0 0 30px var(--accent);
  }

  .tagline {
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }

  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0 auto 2rem;
    opacity: 0.4;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .network {
    margin-top: 2.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }

  .network a {
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.3s;
  }

  .network a:hover {
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="container">
    <span class="icon">⬡</span>
    <div class="node-name">WHORLD Node</div>
    <div class="tagline">Distributed memory fabric — data persists in motion</div>
    <div class="divider"></div>
    <div class="status">
      <div class="dot"></div>
      WHORLD Pelagos Network Node — Active
    </div>
    <div class="network">
      <a href="https://whorld.ai">whorld.ai</a>
    </div>
  </div>
</body>
</html>
